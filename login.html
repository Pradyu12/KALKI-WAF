<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <title>SUDARSHANA | LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0d0d12; color: #e4e1e8; font-family: 'JetBrains Mono', monospace; }
        .glow-box { box-shadow: 0 0 20px rgba(173, 198, 255, 0.1); border: 1px solid rgba(255,255,255,0.06); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="glow-box bg-[#131318] p-10 rounded-xl w-[380px]">
        <div class="text-center mb-8">
            <h1 class="text-[#adc6ff] font-bold text-xl tracking-tighter">KALKI WAF</h1>
            <p class="text-[#414755] text-[10px] uppercase tracking-widest mt-1">Sudarshana Protocol</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="text-[9px] text-[#8b90a0] uppercase tracking-widest block mb-1">Operator ID</label>
                <input type="text" id="username" class="w-full bg-[#1a1a21] border border-[#414755] rounded-md px-4 py-3 text-sm outline-none focus:border-[#adc6ff] transition-all" placeholder="kalki"/>
            </div>
            <div>
                <label class="text-[9px] text-[#8b90a0] uppercase tracking-widest block mb-1">Access Key</label>
                <input type="password" id="password" class="w-full bg-[#1a1a21] border border-[#414755] rounded-md px-4 py-3 text-sm outline-none focus:border-[#adc6ff] transition-all" placeholder="••••••••"/>
            </div>
            <button onclick="login()" class="w-full bg-[#adc6ff] text-[#001a41] font-bold py-3 rounded-md mt-4 hover:opacity-90 transition-all text-sm">INITIALIZE SESSION</button>
            <p id="err" class="text-[#ff003c] text-[10px] text-center mt-3 h-4"></p>
        </div>
    </div>
    <script>
        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('err');
            err.textContent = "";

            const formData = new URLSearchParams();
            formData.append('username', u);
            formData.append('password', p);

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('kalki_token', data.access_token);
                    window.location.href = '/';
                } else {
                    err.textContent = "INVALID CREDENTIALS";
                }
            } catch (e) {
                err.textContent = "CONNECTION ERROR";
            }
        }
        // Support enter key
        document.addEventListener('keypress', e => { if(e.key === 'Enter') login(); });
    </script>
</body>
</html>
