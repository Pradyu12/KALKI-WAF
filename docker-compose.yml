version: '3.8'

services:
  waf:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-credentials.json
      - UPSTREAM_SERVER_URL=http://upstream:8080
    depends_on:
      - upstream
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro

  upstream:
    build:
      context: ./upstream
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080