[build]
  command = "echo 'No build step required'"
  functions = "netlify/functions"
  publish = "frontend"

# API → Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Root → dashboard
[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

# Static assets
[[redirects]]
  from = "/earth.jpg"
  to = "/static/earth.jpg"
  status = 200

[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/dashboard.html"
  status = 200
